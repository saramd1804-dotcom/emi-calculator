<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>💰 EMI Calculator</h1>
<p style="text-align:center; color:gray; margin-bottom:20px;">
    Calculate your loan EMI instantly
</p>

        <div class="input-group">
            <label>Loan Amount (₹)</label>
            <input type="number" id="loanAmount" placeholder="Enter Loan Amount">
        </div>

        <div class="input-group">
            <label>Interest Rate (%)</label>
            <input type="number" id="interestRate" placeholder="Enter Interest Rate">
        </div>

        <div class="input-group">
            <label>Loan Tenure (Years)</label>
            <input type="number" id="loanTenure" placeholder="Enter Loan Tenure">
        </div>

        <button onclick="calculateEMI()">Calculate EMI</button>

        <div class="result">
            <p><strong>Monthly EMI:</strong> ₹<span id="emi">0</span></p>
            <p><strong>Total Interest:</strong> ₹<span id="interest">0</span></p>
            <p><strong>Total Payment:</strong> ₹<span id="payment">0</span></p>
        </div>

        <div class="footer">
            <p>Sara Qatoon</p>
            <p>saramd1804@gmail.com</p>

            <a href="https://digitalheroesco.com" target="_blank">
                <button>Built for Digital Heroes</button>
            </a>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
